<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Window Blur Alert</title>
    <script>
        // 监听窗口失去焦点事件
        window.addEventListener('blur', function() {
            alert('检测到切出');
        });

        window.addEventListener('visibilitychange', function() {
            alert('检测到切出');
        })
    </script>
</head>
<body>
    <h1>检测是否失去焦点</h1>
</body>
</html>
